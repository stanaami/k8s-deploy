apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  labels:
    app: test
    env: testing
spec:
  containers:
  - name: nginx
    image: nginx:1.25-alpine
    ports:
    - containerPort: 80
      name: http
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
  restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: test-pod-service
  labels:
    app: test
spec:
  type: ClusterIP
  selector:
    app: test
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http
